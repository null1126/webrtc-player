<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- 纯绿色系（无蓝紫） -->
    <linearGradient id="frameGrad" x1="28" y1="30" x2="172" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6EE7B7" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>

    <!-- 细腻阴影，保证白底层次 -->
    <filter id="soft" x="14" y="18" width="172" height="164" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#065F46" flood-opacity="0.14" />
    </filter>
  </defs>

  <g filter="url(#soft)">
    <!-- 外层框体：极简圆角屏幕 -->
    <rect x="24" y="30" width="152" height="140" rx="34" fill="url(#frameGrad)" />

    <!-- 内层留白：在浅色背景下形成稳定对比 -->
    <rect x="40" y="46" width="120" height="108" rx="24" fill="#FFFFFF" />

    <!-- 播放符号：比例更协调的圆角三角，保持居中 -->
    <path
      d="M88 78C85.6 76.6 83 78.3 83 81V119C83 121.7 85.6 123.4 88 122L118 103.9C120.3 102.5 120.3 99.5 118 98.1L88 78Z"
      fill="#059669"
    />

    <!-- 保留右上小圆点 -->
    <circle cx="142" cy="62" r="4" fill="#A7F3D0" />

  </g>
</svg>
